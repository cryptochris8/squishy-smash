[build]
  base = "website"
  command = "npm run build"
  publish = "dist"

# Pretty-URL aliases: /privacy and /support resolve to the static
# .html files (without the SPA catch-all swallowing them). These
# specific rules MUST come before the SPA fallback below — Netlify
# evaluates redirects top-to-bottom and stops at the first match.
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/support"
  to = "/support.html"
  status = 200

# SPA fallback — every other path renders the React app's index.html
# so client-side anchors (#collection, #join, etc.) work even on a
# direct deep-link.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers — addresses the post-review finding that the
# Netlify deploy was shipping no headers at all. CSP is intentionally
# permissive on inline styles because the SPA's Tailwind output ships
# them; tighten by adding a hash/nonce step if/when we lock down.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Long-lived caching for fingerprinted asset bundles. Vite emits
# files with content hashes in their names, so cache-busting is
# automatic on every deploy.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cards + sprites + thumbnails are content-addressed by name, not by
# hash. Cache them for a day with revalidation so a re-rendered card
# can ship without a hard reset.
[[headers]]
  for = "/cards/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/sprites/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/thumbnails/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
