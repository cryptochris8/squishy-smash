workflows:
  ios-debug:
    name: iOS — Pipeline Sanity (unsigned)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      # Pinned versions — auto-tracking `stable` / `latest` lets a
      # silent upstream change break the build between runs. Bump
      # these deliberately when you've tested locally on the new
      # versions; never let them float.
      #
      # Xcode 26 (iOS 26 SDK) is required to upload to App Store
      # Connect from 2026-04-28 onward (Apple ITMS-90725). If the
      # build fails on missing-Xcode-version, check Codemagic's
      # supported-versions list and pin the closest 26.x.x available.
      flutter: 3.32.5
      xcode: 26.0
      cocoapods: 1.16.2
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Static analysis
        script: flutter analyze
      - name: Unit tests
        script: flutter test
      - name: Build unsigned iOS .app
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - flutter_drive.log

  ios-release:
    name: iOS — TestFlight Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Pregame
    environment:
      # Pinned versions — auto-tracking `stable` / `latest` lets a
      # silent upstream change break the build between runs. Bump
      # these deliberately when you've tested locally on the new
      # versions; never let them float.
      #
      # Xcode 26 (iOS 26 SDK) is required to upload to App Store
      # Connect from 2026-04-28 onward (Apple ITMS-90725). If the
      # build fails on missing-Xcode-version, check Codemagic's
      # supported-versions list and pin the closest 26.x.x available.
      flutter: 3.32.5
      xcode: 26.0
      cocoapods: 1.16.2
      groups:
        # Variable group in Codemagic dashboard. Must contain at least:
        #   - CERTIFICATE_PRIVATE_KEY (secure) — RSA key for App Store cert
        #   - APP_STORE_APPLE_ID (plain) — numeric app ID from ASC
        #   - SENTRY_DSN (secure) — full DSN URL from Sentry for crash
        #     reporting; gets passed to `flutter build ipa` via
        #     `--dart-define=SENTRY_DSN=$SENTRY_DSN` so release builds
        #     forward errors. Validated at the start of the build —
        #     missing/empty fails the run loudly rather than shipping
        #     silently with crash reporting off.
        #   - SENTRY_AUTH_TOKEN (secure) — internal-integration token
        #     from sentry.io with `project:write` so the post-archive
        #     step can upload dSYMs for symbolication.
        #   - SENTRY_ORG (plain) — slug, e.g. "squishy-smash"
        #   - SENTRY_PROJECT (plain) — slug, e.g. "squishy-smash-ios"
        - smash
      vars:
        BUNDLE_ID: "com.athletedomains.squishySmash"
        TEAM_ID: "Q3UH3Y4QUU"
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true
    scripts:
      - name: Verify required secrets
        # Fail the build loudly when SENTRY_DSN is missing rather
        # than shipping an IPA that's silently invisible to crash
        # reporting. Repeat for the dSYM-upload secrets.
        script: |
          missing=""
          for var in SENTRY_DSN SENTRY_AUTH_TOKEN SENTRY_ORG SENTRY_PROJECT; do
            if [ -z "$(eval echo \$$var)" ]; then
              missing="$missing $var"
            fi
          done
          if [ -n "$missing" ]; then
            echo "ERROR: missing required secrets in 'smash' group:$missing"
            echo "Add them in Codemagic dashboard before re-running."
            exit 1
          fi
      - name: Flutter packages
        script: flutter pub get
      - name: Static analysis
        script: flutter analyze
      - name: Unit tests
        script: flutter test
      - name: Initialize keychain
        script: keychain initialize
      - name: Fetch signing files (creates cert + profile if missing)
        script: |
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Apply Xcode provisioning profiles
        script: xcode-project use-profiles
      - name: Set build number
        script: |
          cd $CM_BUILD_DIR/ios
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          BUILD_NUMBER=$((LATEST + 1))
          echo "Setting CFBundleVersion to $BUILD_NUMBER (previous TestFlight build: $LATEST)"
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Flutter build ipa (signed)
        # Forward the Sentry DSN at build time. The Dart-side init in
        # main.dart only runs when SENTRY_DSN is non-empty, so this
        # flag is what flips crash reporting on for the shipped IPA.
        #
        # The --export-options-plist points at the file that the
        # `xcode-project use-profiles` step (above) writes to
        # /Users/builder/export_options.plist on the Codemagic
        # mac_mini_m2 runner. Without this flag, `flutter build ipa`
        # archives successfully but fails the IPA export step with
        # "Runner.app requires a provisioning profile" — even though
        # the .xcarchive already has the profile applied. The flag
        # tells Xcode HOW to use the profile (app-store method, the
        # right team, etc.) which the auto-generated default does
        # not.
        script: |
          flutter build ipa --release \
            --dart-define=SENTRY_DSN="$SENTRY_DSN" \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Upload dSYMs to Sentry
        # Without symbolication every release crash is a wall of
        # raw hex addresses — Sentry becomes cosmetic. The Codemagic
        # mac_mini_m2 image ships sentry-cli; if that ever changes,
        # `brew install getsentry/tools/sentry-cli` here.
        script: |
          DSYM_PATH=$(find build/ios/archive -name "*.xcarchive" -type d | head -1)/dSYMs
          if [ ! -d "$DSYM_PATH" ]; then
            echo "WARNING: no dSYMs found at $DSYM_PATH — skipping upload"
            exit 0
          fi
          sentry-cli debug-files upload \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            --auth-token "$SENTRY_AUTH_TOKEN" \
            "$DSYM_PATH"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        submit_to_app_store: false
