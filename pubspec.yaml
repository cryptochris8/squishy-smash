name: squishy_smash
description: "Squishy Smash — satisfying, ASMR-flavored collectible card game where every smash reveals a soft squishy."
publish_to: 'none'
version: 0.1.1+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flame: 1.35.1
  flame_audio: ^2.11.0
  shared_preferences: ^2.3.0
  collection: ^1.18.0
  path_provider: ^2.1.0
  share_plus: ^10.0.0
  in_app_purchase: ^3.2.0
  # Note: google_mobile_ads + app_tracking_transparency intentionally
  # NOT bundled in v0.1.1 — see lib/core/feature_flags.dart for the
  # rationale. Implementation files preserved under
  # _pending_v02/monetization/ for re-enable. To restore, add the
  # deps back here, move the files into lib/monetization/, restore
  # the AdMob/ATT/SKAdNetwork keys to ios/Runner/Info.plist + the
  # AndroidManifest <meta-data> for AdMob APPLICATION_ID, and ship
  # with --dart-define=ADS_ENABLED=true.
  sentry_flutter: ^8.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  fake_async: ^1.3.1
  yaml: ^3.1.2

flutter:
  uses-material-design: true

  fonts:
    # Bundled to avoid the network fetch `google_fonts` would otherwise
    # do on first launch — App Store review devices are commonly run
    # under restricted networks where that fetch silently fails and
    # the app falls back to a system font. Variable font: one TTF
    # covers all weights (300–700) the UI uses.
    - family: Fredoka
      fonts:
        - asset: assets/google_fonts/Fredoka.ttf

  assets:
    - assets/data/liveops_schedule.json
    - assets/data/cards_manifest.json
    - assets/data/custom_cards_manifest.json
    - assets/data/economy.json
    - assets/data/packs/launch_squishy_foods.json
    - assets/data/packs/goo_fidgets_drop_01.json
    - assets/data/packs/creepy_cute_pack_01.json
    - assets/data/packs/dumpling_squishy_drop_01.json
    - assets/cards/final_48/
    - assets/cards/custom_family/
    - assets/images/objects/
    - assets/images/thumbnails/
    - assets/images/decals/
    - assets/images/arenas/
    - assets/images/ui/
    - assets/audio/food/
    - assets/audio/goo/
    - assets/audio/creature/
    - assets/audio/ui/
    - assets/audio/vo/
